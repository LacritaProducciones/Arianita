<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz 8 meses mi amor</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:'Poppins',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* TITULO */

h1{
font-family:'Great Vibes',cursive;
font-size:clamp(32px,6vw,70px);
color:white;
margin-bottom:20px;
text-shadow:0 10px 20px rgba(0,0,0,0.3);
text-align:center;
padding:0 10px;
}

/* FOTO */

.foto img{
width:70%;
max-width:260px;
border-radius:25px;
border:8px solid white;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

/* CORAZONES */

.heart{
position:absolute;
bottom:-20px;
color:red;
font-size:25px;
animation:flotar 6s linear infinite;
}

@keyframes flotar{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

/* BURBUJA CHAT */

.chat{
position:fixed;
right:15px;
bottom:20px;
background:#25D366;
color:white;
padding:10px 15px;
border-radius:20px;
font-size:14px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
cursor:pointer;
display:none;
animation:aparecer .5s ease;
}

.chat:after{
content:"";
position:absolute;
right:10px;
bottom:-10px;
border-width:10px;
border-style:solid;
border-color:#25D366 transparent transparent transparent;
}

@keyframes aparecer{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* SOBRE */

.envelope{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:300px;
height:200px;
background:#fff;
border-radius:10px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
display:none;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.5s;
}

/* SOLAPA DEL SOBRE */

.envelope:before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff6b81;
clip-path:polygon(0 0,50% 60%,100% 0);
transition:0.6s;
}

/* CARTA */

.letter{
position:absolute;
background:white;
padding:20px;
border-radius:10px;
width:80%;
max-width:260px;
max-height:400px;
overflow:auto;
text-align:center;
transform:scale(0);
transition:0.6s;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
font-size:14px;
}

/* BOTON CERRAR */

.close{
position:absolute;
top:10px;
right:15px;
font-size:20px;
cursor:pointer;
color:#ff4d6d;
font-weight:bold;
}

/* SOBRE ABIERTO */

.open .letter{
transform:scale(1);
}

.open:before{
transform:rotateX(180deg);
}

/* TEXTO */

#texto{
white-space:pre-line;
}

/* EXTRA MOBILE */

@media (max-width:480px){

h1{
margin-bottom:10px;
}

.foto img{
width:80%;
}

.chat{
font-size:13px;
padding:8px 12px;
}

}

</style>
</head>

<body>

<h1>Feliz 8 meses mi amor ❤️</h1>

<div class="foto">
<img src="foto.jpg">
</div>

<div class="chat" id="mensaje">
💌 Tienes una carta… ¿Quieres abrirla?
</div>

<div class="envelope" id="sobre">

<div class="letter">

<div class="close" id="cerrar">✖</div>

<h2>Para ti 💕</h2>

<p id="texto"></p>

</div>

</div>

<script>

/* CORAZONES */

function crearCorazon(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*25)+"px";

heart.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);

}

setInterval(crearCorazon,300);


/* BURBUJA APARECE */

setTimeout(()=>{
document.getElementById("mensaje").style.display="block";
},1000);


/* ABRIR SOBRE */

const mensaje=document.getElementById("mensaje");
const sobre=document.getElementById("sobre");

mensaje.onclick=()=>{
sobre.style.display="flex";
}

sobre.onclick=()=>{
sobre.classList.add("open");
escribir();
}


/* EFECTO ESCRIBIR */

const texto="Hoy celebramos 8 meses juntos ❤️\n\nLa verdad es que nunca imaginé que alguien pudiera hacerme sentir tan feliz como tú lo haces todos los días. Desde que llegaste a mi vida, todo se volvió más bonito, más especial y más lleno de momentos que quiero recordar siempre.\n\nGracias por tu cariño, por tu paciencia, por tus abrazos, por hacerme reír incluso cuando no tengo ganas, y por estar a mi lado en cada momento.\n\nEstos 8 meses contigo han sido increíbles, y cada día que pasa me doy cuenta de lo mucho que significas para mí.\n\nNo sé qué nos espera en el futuro, pero sí sé que quiero seguir viviendo muchos momentos más contigo, creando recuerdos, riendo juntos y acompañándonos siempre.\n\nTe amo muchísimo ❤️";

let i=0;

function escribir(){

if(i<texto.length){

document.getElementById("texto").innerHTML+=texto.charAt(i);

i++;

setTimeout(escribir,40);

}

}

/* BOTON CERRAR */

const cerrar=document.getElementById("cerrar");

cerrar.onclick=(e)=>{

e.stopPropagation();

sobre.classList.remove("open");

document.getElementById("texto").innerHTML="";

i=0;

}

</script>

</body>
</html>
